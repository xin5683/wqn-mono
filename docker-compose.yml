# Wrong-Question-Notebook — full stack (Postgres + Rust API + Next.js frontend).
#
# Run from the repo root:
#   cp .env.example .env          # then edit AUTH_JWT_SECRET (openssl rand -base64 48)
#   docker compose up --build -d
#
# Services:
#   postgres  PostgreSQL 16
#   backend   Rust/Axum API (builds from ./backend; SQLx migrations run on startup)
#   frontend  Next.js standalone (builds from ./frontend/web; proxies /api -> backend)
#
# The frontend bakes WQN_API_BASE_URL into its routes manifest at BUILD time
# (default http://backend:8080) and also needs it at RUNTIME for proxy.ts /
# server-side fetches. Do not run this alongside the per-stack compose files in
# backend/ or frontend/web/ — they share the wqn-net network and container names.
services:
  postgres:
    image: postgres:16-alpine
    container_name: wqn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wqn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wqn_password}
      POSTGRES_DB: ${POSTGRES_DB:-wqn}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wqn} -d ${POSTGRES_DB:-wqn}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wqn-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: wqn-backend:latest
    container_name: wqn-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wqn}:${POSTGRES_PASSWORD:-wqn_password}@postgres:5432/${POSTGRES_DB:-wqn}
      APP_BIND_ADDR: 0.0.0.0:8080
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required — generate with: openssl rand -base64 48}"
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-wqn_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_SESSION_TTL_SECONDS: ${AUTH_SESSION_TTL_SECONDS:-2592000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      LOCAL_STORAGE_ROOT: /app/storage
      # Optional integrations — uncomment / set in .env if needed:
      # GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # CRON_SECRET: ${CRON_SECRET:-}
      # LOCAL_STORAGE_SCAN_COMMAND: ${LOCAL_STORAGE_SCAN_COMMAND:-}
    volumes:
      - backend_storage:/app/storage
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - wqn-net

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        # Baked into the standalone routes manifest at build time:
        WQN_API_BASE_URL: ${WQN_API_BASE_URL:-http://backend:8080}
        SITE_URL: ${SITE_URL:-http://localhost:3000}
    image: wqn-frontend:latest
    container_name: wqn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      # Needed at runtime by proxy.ts and server-side fetches:
      WQN_API_BASE_URL: ${WQN_API_BASE_URL:-http://backend:8080}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - wqn-net

volumes:
  pg_data:
  backend_storage:

networks:
  wqn-net:
    name: wqn-net
    driver: bridge
