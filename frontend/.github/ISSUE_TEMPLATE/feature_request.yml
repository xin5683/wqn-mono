name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
    - type: markdown
      attributes:
          value: |
              Thanks for suggesting a feature! Please describe your idea below.

    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What problem does this feature solve? Is it related to a frustration?
          placeholder: I'm always frustrated when...
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed Solution
          description: Describe the solution you'd like.
      validations:
          required: true

    - type: dropdown
      id: area
      attributes:
          label: Area
          description: Which part of the app does this relate to?
          options:
              - Subjects / Problem Sets
              - Problem Logging
              - Tags / Organization
              - Review / Mastery Tracking
              - Image Upload / OCR
              - Authentication / Account
              - Landing Page / Marketing
              - Other

    - type: textarea
      id: context
      attributes:
          label: Additional Context
          description: Any mockups, screenshots, or references that help illustrate the feature.
